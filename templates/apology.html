{% extends "layout.html" %}

{% block title %}Eroare | {% if session["gender"] == "F" %}{{ t("app_name_f") }}{% else %}{{ t("app_name_m") }}{% endif %}{% endblock %}

{% block main %}
<div class="min-h-[75vh] flex flex-col items-center justify-center bg-gradient-to-br from-slate-950 via-slate-900 to-slate-800 p-6">
    <div class="bg-slate-900 border border-slate-800 rounded-3xl p-8 max-w-md w-full text-center shadow-2xl">
        <div class="w-20 h-20 bg-cyan-500/10 border border-cyan-500/30 text-cyan-400 rounded-full flex items-center justify-center mx-auto mb-6 text-4xl font-bold">
            !
        </div>
        <h1 class="text-6xl font-extrabold text-white mb-2">{{ top }}</h1>
        <h2 class="text-xl font-bold text-cyan-400 mb-4">A apărut o eroare</h2>
        <p class="text-slate-300 text-sm leading-relaxed mb-6">{{ bottom }}</p>
        
        <div class="flex flex-col gap-3">
            <button onclick="history.back()" class="bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-bold py-3 px-6 rounded-xl transition">
                Înapoi
            </button>
            <a href="/" class="text-slate-400 hover:text-white transition text-sm font-semibold">
                Pagina principală
            </a>
        </div>
    </div>
</div>
{% endblock %}
