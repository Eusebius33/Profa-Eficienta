{% extends "layout1.html" %}

{% block title %}
    Error {{ top }}
{% endblock %}

{% block main %}

<div class="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-slate-800 flex items-center justify-center px-4 py-10">
    <div class="w-full max-w-xl bg-slate-900/70 backdrop-blur-lg border border-slate-700 rounded-3xl shadow-2xl p-8 text-center">
        <div class="text-cyan-400 text-6xl font-black tracking-tight mb-2">
            {{ top }}
        </div>

        <h1 class="text-2xl font-bold text-white mb-3">
            We're sorry
        </h1>

        <p class="text-slate-300 mb-8 break-words">
            {{ bottom }}
        </p>

        <div class="flex flex-col sm:flex-row gap-3 justify-center">
            <a
                href="javascript:history.back()"
                class="rounded-xl border border-slate-700 bg-slate-800 hover:bg-slate-700 text-white font-semibold px-6 py-3 transition no-underline">
                Go Back
            </a>

            <a
                href="/"
                class="rounded-xl bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-bold px-6 py-3 transition no-underline">
                Home
            </a>
        </div>
    </div>
</div>

{% endblock %}
